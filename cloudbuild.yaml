steps:
  # Step 1: Run backend tests (skipped if no tests directory)
  - name: 'python:3.12'
    id: test-backend
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        pip install -r requirements.txt
        if [ -d tests ] && [ "$(ls -A tests/)" ]; then
          pytest tests/ -v --tb=short
        else
          echo "No tests found, skipping."
        fi

  # Step 2: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    waitFor: ['test-backend']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/backend:latest'
      - './backend'

  # Step 3: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/backend'

  # Step 4: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    waitFor: ['push-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'devsheriff-backend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=devsheriff-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,GCP_PROJECT_ID=$PROJECT_ID,FIRESTORE_PROJECT_ID=$PROJECT_ID'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'

  # Step 5: Build dashboard Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-dashboard
    waitFor: ['test-backend']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/dashboard:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/dashboard:latest'
      - '--build-arg'
      - 'VITE_FIRESTORE_PROJECT_ID=$PROJECT_ID'
      - './dashboard'

  # Step 6: Push dashboard image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-dashboard
    waitFor: ['build-dashboard']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/dashboard'

  # Step 7: Deploy dashboard to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-dashboard
    waitFor: ['push-dashboard']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'devsheriff-dashboard'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/devsheriff-images/dashboard:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
